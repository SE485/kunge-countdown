<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坤哥倒计时</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* 搞笑浮动文字 */
        .floating-text {
            position: absolute;
            font-size: 14px;
            color: #ff6b6b;
            opacity: 0.6;
            animation: float 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* 主容器 */
        .container {
            text-align: center;
            z-index: 10;
            padding: 40px;
            background: rgba(255,255,255,0.35);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            border: 3px dashed rgba(255,107,107,0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        /* 标题 */
        .title {
            font-size: 48px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0px #ff6b6b;
            animation: shake 2s ease-in-out infinite;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }

        .subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
        }

        /* 倒计时显示 */
        .countdown-display {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .time-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            min-width: 80px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: transform 0.3s;
        }

        .time-box:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .time-number {
            font-size: 48px;
            font-weight: bold;
            display: block;
        }

        .time-label {
            font-size: 14px;
            opacity: 0.9;
        }

        /* 设置区域 */
        .settings {
            margin: 30px 0;
            padding: 20px;
            background: rgba(248,249,250,0.5);
            border-radius: 15px;
            border: 2px solid rgba(233,236,239,0.5);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        .input-group {
            margin: 10px 0;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }

        .input-group input {
            padding: 10px 15px;
            border: 2px solid rgba(221,221,221,0.6);
            border-radius: 10px;
            font-size: 16px;
            width: 200px;
            text-align: center;
            transition: border-color 0.3s;
            background: rgba(255,255,255,0.5);
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        /* 按钮 */
        .btn {
            padding: 12px 30px;
            margin: 5px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-3px);
        }

        /* 搞笑提示 */
        .funny-tip {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,243,205,0.6);
            border: 2px solid rgba(255,234,167,0.5);
            border-radius: 10px;
            color: #856404;
            font-size: 14px;
            min-height: 50px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        /* 进度条 */
        .progress-container {
            width: 100%;
            height: 20px;
            background: rgba(233,236,239,0.5);
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
            border: 2px solid rgba(222,226,230,0.4);
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            background-size: 300% 100%;
            animation: gradient-shift 2s ease infinite;
            transition: width 1s;
            border-radius: 8px;
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 完成动画 */
        .completed {
            animation: celebrate 1s ease-in-out infinite;
        }

        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* 表情符号 */
        .emoji {
            font-size: 30px;
            margin: 0 5px;
            display: inline-block;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 音乐控制按钮 */
        .music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .music-btn:hover {
            transform: scale(1.1);
            background: rgba(255,255,255,0.9);
        }

        .music-btn.playing {
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        /* 隐藏类 */
        .hidden {
            display: none !important;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .title { font-size: 32px; }
            .time-number { font-size: 32px; }
            .countdown-display { gap: 10px; }
            .time-box { padding: 15px; min-width: 60px; }
        }
    </style>
</head>
<body>
    <!-- 背景音乐 -->
    <audio id="bgMusic" loop>
        <source src="bgm.mp3" type="audio/mpeg">
    </audio>

    <!-- 音乐控制按钮 -->
    <button id="musicToggle" class="music-btn" onclick="toggleMusic()" title="点击播放/暂停音乐">
        🎵
    </button>

    <!-- 浮动搞笑文字 -->
    <div class="floating-text" style="top: 10%; left: 10%;">⏰ 时间紧迫！</div>
    <div class="floating-text" style="top: 20%; right: 15%; animation-delay: 0.5s;">😱 快要到了！</div>
    <div class="floating-text" style="bottom: 15%; left: 20%; animation-delay: 1s;">🤪 准备好了吗？</div>
    <div class="floating-text" style="bottom: 25%; right: 10%; animation-delay: 1.5s;">😂 哈哈哈哈哈！</div>

    <div class="container">
        <h1 class="title">坤哥倒计时</h1>
        <p class="subtitle"> <span class="emoji">😈</span></p>

        <!-- 设置区域 -->
        <div class="settings" id="settings">
            <div class="input-group">
                <label>设置倒计时目标：</label>
                <input type="datetime-local" id="targetTime" />
            </div>
            <div class="input-group">
                <label>或者选择预设：</label>
                <button class="btn btn-primary" onclick="setPreset(1)">1分钟后</button>
                <button class="btn btn-primary" onclick="setPreset(5)">5分钟后</button>
                <button class="btn btn-primary" onclick="setPreset(10)">10分钟后</button>
            </div>
            <div class="input-group">
                <label>倒计时标题（可选）：</label>
                <input type="text" id="countdownTitle" placeholder="例如：坤哥出场倒计时" />
            </div>
            <button class="btn btn-primary" onclick="startCountdown()">开始倒计时！</button>
        </div>

        <!-- 倒计时显示区域 -->
        <div id="countdownArea" class="hidden">
            <h2 id="displayTitle" style="margin-bottom: 20px; color: #333;"></h2>
            
            <div class="countdown-display">
                <div class="time-box">
                    <span class="time-number" id="days">00</span>
                    <span class="time-label">天</span>
                </div>
                <div class="time-box">
                    <span class="time-number" id="hours">00</span>
                    <span class="time-label">时</span>
                </div>
                <div class="time-box">
                    <span class="time-number" id="minutes">00</span>
                    <span class="time-label">分</span>
                </div>
                <div class="time-box">
                    <span class="time-number" id="seconds">00</span>
                    <span class="time-label">秒</span>
                </div>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progressBar" style="width: 100%"></div>
            </div>

            <div class="funny-tip" id="funnyTip">
                💡 提示：倒计时期间请保持严肃！（才怪）
            </div>

            <div style="margin-top: 20px;">
                <button class="btn btn-danger" onclick="stopCountdown()">停止倒计时</button>
                <button class="btn btn-primary" onclick="resetCountdown()">重新设置</button>
            </div>
        </div>

        <!-- 完成区域 -->
        <div id="completedArea" class="hidden">
            <h2 class="title completed">时间到！</h2>
            <p style="font-size: 24px; margin: 20px 0;">
                <span class="emoji">🎉</span>
                <span class="emoji">🎊</span>
                <span class="emoji">🎈</span>
                <span class="emoji">🎆</span>
            </p>
            <p id="completedMessage" style="font-size: 18px; color: #666; margin: 20px 0;"></p>
            <button class="btn btn-primary" onclick="resetCountdown()">再来一次！</button>
        </div>
    </div>

    <script>
        let countdownInterval;
        let targetDate;
        let totalDuration;
        let startDate;

        const funnyTips = [
            "💡 提示：倒计时期间请保持严肃！（才怪）",
            "🤔 猜猜时间到了会发生什么？",
            "😎 淡定点，还有时间刷个视频",
            "🙈 不敢看！不敢看！",
            "🤪 准备好迎接惊喜了吗？",
            "😱 时间正在飞速流逝！",
            "🎵 建议播放《鸡你太美》缓解紧张",
            "🤣 友情提示：记得截图发朋友圈",
            "😈 坤哥正在赶来的路上...",
            "🎪 这是一场精心策划的恶作剧！"
        ];

        const completedMessages = [
            "坤哥已经出现！请做好心理准备！",
            "时间到！你的好友正在偷笑！",
            "恭喜你！成功被恶搞了！",
            "惊不惊喜？意不意外？",
            "这是一场有预谋的倒计时！",
            "坤哥说：你已经被我锁定了！"
        ];

        // 设置预设时间
        function setPreset(minutes) {
            const now = new Date();
            now.setMinutes(now.getMinutes() + minutes);
            document.getElementById('targetTime').value = now.toISOString().slice(0, 16);
        }

        // 开始倒计时
        function startCountdown() {
            const targetInput = document.getElementById('targetTime').value;
            if (!targetInput) {
                alert('请先设置倒计时时间！');
                return;
            }

            targetDate = new Date(targetInput);
            startDate = new Date();
            totalDuration = targetDate - startDate;

            if (totalDuration <= 0) {
                alert('目标时间必须在未来！');
                return;
            }

            const title = document.getElementById('countdownTitle').value;
            document.getElementById('displayTitle').textContent = title || '倒计时进行中...';

            document.getElementById('settings').classList.add('hidden');
            document.getElementById('countdownArea').classList.remove('hidden');
            document.getElementById('completedArea').classList.add('hidden');

            updateCountdown();
            countdownInterval = setInterval(updateCountdown, 1000);
            
            // 定期更换搞笑提示
            setInterval(() => {
                if (!document.getElementById('countdownArea').classList.contains('hidden')) {
                    const tip = funnyTips[Math.floor(Math.random() * funnyTips.length)];
                    document.getElementById('funnyTip').textContent = tip;
                }
            }, 5000);
        }

        // 更新倒计时
        function updateCountdown() {
            const now = new Date();
            const diff = targetDate - now;

            if (diff <= 0) {
                completeCountdown();
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');

            // 更新进度条
            const elapsed = now - startDate;
            const progress = Math.max(0, 100 - (elapsed / totalDuration * 100));
            document.getElementById('progressBar').style.width = progress + '%';
        }

        // 完成倒计时
        function completeCountdown() {
            clearInterval(countdownInterval);
            document.getElementById('countdownArea').classList.add('hidden');
            document.getElementById('completedArea').classList.remove('hidden');
            
            const message = completedMessages[Math.floor(Math.random() * completedMessages.length)];
            document.getElementById('completedMessage').textContent = message;

            // 播放完成音效（如果浏览器支持）
            playCompletionSound();
        }

        // 停止倒计时
        function stopCountdown() {
            clearInterval(countdownInterval);
            resetCountdown();
        }

        // 重置倒计时
        function resetCountdown() {
            clearInterval(countdownInterval);
            document.getElementById('settings').classList.remove('hidden');
            document.getElementById('countdownArea').classList.add('hidden');
            document.getElementById('completedArea').classList.add('hidden');
            document.getElementById('targetTime').value = '';
            document.getElementById('countdownTitle').value = '';
        }

        // 播放完成音效
        function playCompletionSound() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime); // C5
                oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.1); // E5
                oscillator.frequency.setValueAtTime(783.99, audioContext.currentTime + 0.2); // G5
                
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.5);
            } catch (e) {
                console.log('音效播放失败:', e);
            }
        }

        // 音乐播放控制
        let isMusicPlaying = false;

        function startMusic() {
            const bgMusic = document.getElementById('bgMusic');
            const musicBtn = document.getElementById('musicToggle');
            bgMusic.volume = 0.5;
            bgMusic.play().then(() => {
                isMusicPlaying = true;
                musicBtn.classList.add('playing');
                musicBtn.title = '点击暂停音乐';
            }).catch(e => {
                console.log('自动播放被阻止:', e);
            });
        }

        function toggleMusic() {
            const bgMusic = document.getElementById('bgMusic');
            const musicBtn = document.getElementById('musicToggle');
            
            if (bgMusic.paused) {
                startMusic();
            } else {
                bgMusic.pause();
                isMusicPlaying = false;
                musicBtn.classList.remove('playing');
                musicBtn.title = '点击播放音乐';
            }
        }

        // 页面加载时设置默认时间并尝试自动播放音乐
        window.onload = function() {
            setPreset(1);
            startMusic();
        };
    </script>
</body>
</html>
